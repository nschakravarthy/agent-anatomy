server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Forward API calls to the backend service.
    location /api/ {
        # Resolve "backend" at request time via Docker's embedded DNS (127.0.0.11)
        # instead of at startup. A literal proxy_pass would make nginx fail to
        # boot if the backend isn't resolvable yet, and would cache a stale IP if
        # the backend container restarts. Using a variable defers resolution.
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $backend_upstream http://backend:8000;

        # With a variable in proxy_pass nginx does not auto-append the matched
        # location, so pass the full original URI: /api/v1/chat -> backend:8000/api/v1/chat.
        proxy_pass $backend_upstream$request_uri;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # SPA fallback: serve index.html for any client-side route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
