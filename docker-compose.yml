services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY in your shell or .env}
    networks:
      - backend-network
    
  postgres-db:
    image: pgvector/pgvector:pg15
    container_name: postgres-db
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testadmin
      - POSTGRES_PASSWORD=test1234
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testadmin -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Serves the built React SPA and reverse-proxies /api to the backend, so the
  # whole app is reachable at http://localhost on a single origin.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge

volumes:
  postgres_data:
